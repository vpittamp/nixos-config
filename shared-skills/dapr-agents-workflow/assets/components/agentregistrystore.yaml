# Team registry state store for AUTONOMOUS multi-agent orchestration (Pattern B only).
# Referenced by: registry=AgentRegistryConfig(store=StateStoreService(store_name="agentregistrystore"), team_name="...")
# Agents that share a team_name discover each other through this store.
# Plain application state — do NOT set actorStateStore here (that belongs to agent-workflow).
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: agentregistrystore
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: localhost:6379
    - name: redisPassword
      value: ""
