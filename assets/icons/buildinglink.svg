<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">BuildingLink</title>
  <desc id="desc">BuildingLink icon with interlocking blue and gold links on a navy background.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="216" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c3c66"/>
      <stop offset="1" stop-color="#10223b"/>
    </linearGradient>
    <linearGradient id="gold" x1="68" y1="64" x2="150" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#efd48b"/>
      <stop offset="1" stop-color="#d9b560"/>
    </linearGradient>
    <linearGradient id="blue" x1="106" y1="62" x2="190" y2="194" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8db7ff"/>
      <stop offset="1" stop-color="#3c6cb4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#09111d" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
  <rect x="18" y="18" width="220" height="220" rx="54" fill="none" stroke="#fff" stroke-opacity=".08"/>

  <g filter="url(#shadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="70" y="64" width="74" height="128" rx="37" stroke="url(#gold)" stroke-width="24"/>
    <rect x="112" y="64" width="74" height="128" rx="37" stroke="url(#blue)" stroke-width="24"/>
  </g>

  <path d="M122 92h12c17.673 0 32 14.327 32 32v8c0 17.673-14.327 32-32 32h-12" fill="none" stroke="#f4e3b4" stroke-linecap="round" stroke-width="10" opacity=".18"/>
  <circle cx="84" cy="84" r="10" fill="#fff" opacity=".14"/>
</svg>
