<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="node4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
  <!-- Connection lines -->
  <line x1="220" y1="168" x2="292" y2="228" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="220" y1="344" x2="292" y2="284" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="372" y1="256" x2="420" y2="256" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <!-- Arrow heads -->
  <polygon points="415,244 435,256 415,268" fill="white" opacity="0.5"/>
  <!-- Node 1: Top-left (input) -->
  <rect x="88" y="120" width="132" height="72" rx="16" fill="url(#node1)"/>
  <line x1="112" y1="148" x2="152" y2="148" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="112" y1="164" x2="196" y2="164" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Node 2: Bottom-left (input) -->
  <rect x="88" y="304" width="132" height="72" rx="16" fill="url(#node2)"/>
  <line x1="112" y1="332" x2="152" y2="332" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="112" y1="348" x2="196" y2="348" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Node 3: Center (process) — diamond shape via rotated square -->
  <rect x="292" y="216" width="80" height="80" rx="12" fill="url(#node3)" transform="rotate(0, 332, 256)"/>
  <!-- Gear/process symbol in center node -->
  <circle cx="332" cy="256" r="18" fill="none" stroke="white" stroke-width="5" opacity="0.9"/>
  <circle cx="332" cy="256" r="6" fill="white" opacity="0.9"/>
  <!-- Output dots -->
  <circle cx="440" cy="256" r="16" fill="url(#node4)"/>
  <circle cx="440" cy="256" r="6" fill="white" opacity="0.9"/>
  <!-- Port dots on nodes -->
  <circle cx="220" cy="156" r="6" fill="white" opacity="0.8"/>
  <circle cx="220" cy="340" r="6" fill="white" opacity="0.8"/>
  <circle cx="292" cy="256" r="6" fill="white" opacity="0.8"/>
  <circle cx="372" cy="256" r="6" fill="white" opacity="0.8"/>
</svg>
